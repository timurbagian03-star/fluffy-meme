<!DOCTYPE html>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#e5e5e5;
}
.container{
    max-width:750px;
    margin:auto;
    background:#fff;
    min-height:100vh;
}
.header{
    background:#27348b;
    color:white;
    padding:15px;
    font-size:18px;
    font-weight:bold;
}
.box{padding:20px;}
.soal{
    margin-bottom:15px;
    padding:15px;
    border:1px solid #ddd;
    border-radius:10px;
}

/* RADIO STYLE */
.pilihan{
    display:flex;
    align-items:center;
    gap:12px;
    margin:10px 0;
    cursor:pointer;
    padding:10px;
    border:1px solid #eee;
    border-radius:10px;
    transition:0.2s;
}

.pilihan:hover{
    background:#f5f6ff;
    border-color:#27348b;
}

.pilihan input[type="radio"]{
    display:none;
}

.custom-radio{
    width:20px;
    height:20px;
    border:2px solid #27348b;
    border-radius:50%;
    display:inline-block;
    position:relative;
    flex-shrink:0;
}

.pilihan input[type="radio"]:checked + .custom-radio{
    background:#27348b;
}

.pilihan input[type="radio"]:checked + .custom-radio::after{
    content:"";
    width:8px;
    height:8px;
    background:white;
    border-radius:50%;
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
}

button{
    padding:10px 15px;
    border:none;
    background:#27348b;
    color:white;
    border-radius:8px;
    cursor:pointer;
    margin:5px;
}

input{
    padding:10px;
    width:100%;
    margin-bottom:10px;
}

.hidden{display:none;}

.timer{
    font-size:18px;
    font-weight:bold;
    color:red;
    margin-bottom:10px;
}
</style>
</head>

<div class="header">PAPI KOSTICK FINAL (READY HOSTING)</div>

<!-- LOGIN -->
<div id="loginBox" class="box">
    <h3>Login</h3>
    <input id="username" placeholder="Masukkan nama kamu">
    <button onclick="login()">Masuk</button>
</div>

<!-- INTRO -->
<div id="introBox" class="box hidden">
    <h2>TES PAPI KOSTICK</h2>
    <p><b>Buatan Van</b></p>
    <p>Durasi: 20 menit</p>
    <button onclick="startTest()">Mulai Tes</button>
</div>

<!-- TEST -->
<div id="testBox" class="box hidden">
    <h3 id="welcome"></h3>
    <div class="timer">Sisa waktu: <span id="time">20:00</span></div>
    <div id="soalContainer"></div>

    <button onclick="prev()">Kembali</button>
    <button onclick="next()">Lanjut</button>
    <button onclick="finish()">Selesai</button>
</div>

<!-- RESULT -->
<div id="resultBox" class="box hidden"></div>

</div>

// ===== SYSTEM =====
let user="";
let page=0;
let jawaban=new Array(soal.length).fill(null);
let timer=1200;
let interval;

// LOGIN
function login(){
    let name=document.getElementById("username").value;
    if(!name) return alert("Isi nama dulu!");
    user=name;

    document.getElementById("loginBox").classList.add("hidden");
    document.getElementById("introBox").classList.remove("hidden");
}

// START
function startTest(){
    document.getElementById("introBox").classList.add("hidden");
    document.getElementById("testBox").classList.remove("hidden");

    document.getElementById("welcome").innerText="Halo, "+user;

    render();
    startTimer();
}

// TIMER
function startTimer(){
    interval=setInterval(()=>{
        timer--;
        let m=Math.floor(timer/60);
        let s=timer%60;
        document.getElementById("time").innerText=m+":"+(s<10?"0":"")+s;

        if(timer<=0) finish();
    },1000);
}

// RENDER
function render(){
    let html="";
    let start=page*5;
    let end=start+5;

    for(let i=start;i<end && i<soal.length;i++){
        html+=`
        <div class="soal">
        <b>${i+1}</b><br>

        <label class="pilihan">
            <input type="radio" name="s${i}" value="A" ${jawaban[i]==="A"?"checked":""}>
            <span class="custom-radio"></span>
            <span><b>A.</b> ${soal[i].a}</span>
        </label>

        <label class="pilihan">
            <input type="radio" name="s${i}" value="B" ${jawaban[i]==="B"?"checked":""}>
            <span class="custom-radio"></span>
            <span><b>B.</b> ${soal[i].b}</span>
        </label>

        </div>`;
    }

    document.getElementById("soalContainer").innerHTML=html;

    document.querySelectorAll("input[type=radio]").forEach(e=>{
        e.onchange=function(){
            let i=parseInt(this.name.replace("s",""));
            jawaban[i]=this.value;
        }
    });
}

// NAV
function next(){if((page+1)*5<soal.length){page++;render();}}
function prev(){if(page>0){page--;render();}}

// FINISH
function finish(){
    clearInterval(interval);

    let A=0,B=0,empty=0;

    for(let i=0;i<soal.length;i++){
        if(jawaban[i]==="A") A++;
        else if(jawaban[i]==="B") B++;
        else empty++;
    }

    document.getElementById("testBox").classList.add("hidden");
    document.getElementById("resultBox").classList.remove("hidden");

    document.getElementById("resultBox").innerHTML=`
        <h2>Hasil</h2>
        <p>Nama: ${user}</p>
        <p>A: ${A}</p>
        <p>B: ${B}</p>
        <p>Kosong: ${empty}</p>
        <p><b>Kesimpulan:</b> ${A>B?"Aktif & dominan":"Tenang & analitis"}</p>
        <p><i>Buatan Van</i></p>
        <button onclick="location.reload()">Logout</button>
    `;
}

</script>
